<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" fill="none" role="img" aria-label="Genesis — Agent Launchpad">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09090b"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
    <linearGradient id="glow" x1="460" y1="0" x2="460" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4a574" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#c4a574" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="920" height="220" fill="url(#bg)"/>
  <ellipse cx="460" cy="0" rx="360" ry="120" fill="url(#glow)"/>

  <!-- Mark -->
  <rect x="72" y="58" width="104" height="104" rx="24" fill="#18181b"/>
  <circle cx="124" cy="118" r="9.5" fill="#c4a574"/>
  <path d="M124 108.5C124 96 110 91 103 101" stroke="#c4a574" stroke-width="4" stroke-linecap="round"/>
  <path d="M124 108.5C124 96 138 91 145 101" stroke="#e8d4b0" stroke-width="4" stroke-linecap="round"/>
  <path d="M124 127.5V145" stroke="#9a7b4f" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
  <circle cx="103" cy="101" r="5.5" fill="#9a7b4f"/>
  <circle cx="145" cy="101" r="5.5" fill="#e8d4b0"/>
  <circle cx="124" cy="145" r="4.5" fill="#71717a" opacity="0.65"/>

  <!-- Wordmark -->
  <text x="208" y="118" fill="#fafafa" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="600" letter-spacing="-1">Genesis</text>
  <text x="210" y="156" fill="#a1a1aa" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" letter-spacing="0.2">Agent issuance on Solana</text>

  <!-- Accent rule -->
  <rect x="208" y="172" width="120" height="3" rx="1.5" fill="#c4a574"/>
