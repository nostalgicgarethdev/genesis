name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -rf node_modules api/node_modules website/node_modules sdk/node_modules
          npm ci
          npm ls vite --workspace=website
          node -e "const v=require('./node_modules/vite/package.json').version; if(v!=='6.3.5'){console.error('Expected vite 6.3.5, got',v); process.exit(1)}"
          if find . -path '*/node_modules/rolldown' -type d | grep -q .; then
            echo "ERROR: rolldown found (Vite 8 pulled in)"
            find . -path '*/node_modules/rolldown' -type d
            exit 1
          fi

      - name: Build website
        env:
          GITHUB_PAGES: true
        run: npm run build --workspace=website

      - name: Add SPA fallback
        run: cp website/dist/index.html website/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4